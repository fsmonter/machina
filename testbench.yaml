laravel: '@testbench'

providers:
  - Machina\MachinaServiceProvider
  - Workbench\App\Providers\WorkbenchServiceProvider

migrations:
  - workbench/database/migrations

seeders:
  - Workbench\Database\Seeders\DatabaseSeeder

workbench:
  start: '/'
  install: true
  health: false
  discovers:
    web: false
    api: false
    commands: false
    components: false
    factories: true
    views: false
  build:
    - create-sqlite-db
    - db-wipe
    - migrate-fresh
  assets: []
  sync: []
